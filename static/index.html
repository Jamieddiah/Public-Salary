<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIRH — Administration Publique Sénégalaise</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   VARIABLES & RESET
   ═══════════════════════════════════════════════════════════════ */
:root {
    --navy: #1A3A5C;
    --navy-light: #2A5A8C;
    --green: #1E4A2E;
    --green-light: #2E6A3E;
    --gold: #D4AF37;
    --gold-light: #E8C84A;
    --bg: #F0F4F8;
    --card: #FFFFFF;
    --text: #1a1a2e;
    --text-light: #64748b;
    --border: #e2e8f0;
    --danger: #DC2626;
    --success: #059669;
    --sidebar-w: 260px;
    --topbar-h: 60px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; font-size: 14px; }

/* ═══════════════════════════════════════════════════════════════
   LOGIN
   ═══════════════════════════════════════════════════════════════ */
#login-page {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: linear-gradient(135deg, var(--navy), var(--green));
}
.login-card {
    background: white; border-radius: 16px; padding: 48px; width: 420px;
    box-shadow: 0 25px 50px rgba(0,0,0,.25); text-align: center;
}
.login-card h1 { font-size: 28px; color: var(--navy); margin-bottom: 4px; }
.login-card .subtitle { color: var(--text-light); margin-bottom: 32px; font-size: 14px; }
.login-card .flag { font-size: 48px; margin-bottom: 16px; display: block; }
.form-group { margin-bottom: 20px; text-align: left; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--text-light); }
.form-group input, .form-group select {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; transition: border .2s;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,.15); }
.btn {
    padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600;
    font-size: 14px; transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--navy); color: white; }
.btn-primary:hover { background: var(--navy-light); }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: var(--green-light); }
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-gold:hover { background: var(--gold-light); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #B91C1C; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }
.login-error { color: var(--danger); font-size: 13px; margin-top: 12px; display: none; }

/* ═══════════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════════ */
#app { display: none; }
.sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w);
    background: var(--navy); color: white; padding: 20px 0; overflow-y: auto;
    display: flex; flex-direction: column; z-index: 100;
}
.sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,.1); text-align: center; }
.sidebar-header .flag { font-size: 32px; }
.sidebar-header h2 { font-size: 20px; font-weight: 700; margin-top: 4px; }
.sidebar-header p { font-size: 11px; opacity: .7; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 12px 0; }
.nav-item {
    display: flex; align-items: center; gap: 10px; padding: 11px 20px;
    color: rgba(255,255,255,.7); transition: all .2s; cursor: pointer; font-size: 14px;
}
.nav-item:hover { background: rgba(255,255,255,.08); color: white; }
.nav-item.active { background: rgba(255,255,255,.12); color: white; border-right: 3px solid var(--gold); }
.nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1); }
.sidebar-footer .user-name { font-size: 13px; font-weight: 600; }
.sidebar-footer .user-role { font-size: 11px; opacity: .6; }
.sidebar-footer .btn-logout { margin-top: 10px; width: 100%; }

.topbar {
    position: fixed; left: var(--sidebar-w); top: 0; right: 0; height: var(--topbar-h);
    background: white; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 90;
}
.topbar h1 { font-size: 18px; color: var(--navy); }
.topbar .user-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-light); }

.content {
    margin-left: var(--sidebar-w); margin-top: var(--topbar-h); padding: 24px;
    min-height: calc(100vh - var(--topbar-h));
}

/* ═══════════════════════════════════════════════════════════════
   COMPOSANTS UI
   ═══════════════════════════════════════════════════════════════ */
.card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.card-title { font-size: 16px; font-weight: 700; color: var(--navy); }

/* KPI Cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); border-left: 4px solid var(--navy); }
.kpi-card .label { font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: .5px; }
.kpi-card .value { font-size: 28px; font-weight: 700; color: var(--navy); margin-top: 4px; }
.kpi-card.green { border-left-color: var(--green); }
.kpi-card.green .value { color: var(--green); }
.kpi-card.gold { border-left-color: var(--gold); }
.kpi-card.gold .value { color: #B8860B; }
.kpi-card.danger { border-left-color: var(--danger); }
.kpi-card.danger .value { color: var(--danger); }

/* Tables */
table { width: 100%; border-collapse: collapse; }
th { background: var(--bg); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-light); padding: 10px 12px; text-align: left; font-weight: 600; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:hover td { background: #f8fafc; }

/* Badges */
.badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: capitalize;
}
.badge-titulaire { background: #DBEAFE; color: #1E40AF; }
.badge-contractuel { background: #FEF3C7; color: #92400E; }
.badge-militaire { background: #FCE7F3; color: #9D174D; }
.badge-gendarmerie { background: #EDE9FE; color: #5B21B6; }
.badge-police { background: #D1FAE5; color: #065F46; }
.badge-en_attente { background: #FEF3C7; color: #92400E; }
.badge-valide { background: #DBEAFE; color: #1E40AF; }
.badge-rejete { background: #FEE2E2; color: #991B1B; }
.badge-visa { background: #D1FAE5; color: #065F46; }

/* Filter bar */
.filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filter-bar input, .filter-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
.filter-bar input { min-width: 200px; }

/* Pagination */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px; }
.pagination button { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 13px; }
.pagination button:hover { background: var(--bg); }
.pagination button.active { background: var(--navy); color: white; border-color: var(--navy); }
.pagination button:disabled { opacity: .4; cursor: not-allowed; }
.pagination span { font-size: 13px; color: var(--text-light); }

/* Modal */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex;
    align-items: center; justify-content: center; z-index: 1000; opacity: 0;
    visibility: hidden; transition: all .2s;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal {
    background: white; border-radius: 16px; width: 90%; max-width: 700px;
    max-height: 90vh; overflow-y: auto; padding: 24px;
    transform: translateY(20px); transition: transform .2s;
}
.modal-overlay.active .modal { transform: translateY(0); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h2 { font-size: 18px; color: var(--navy); }
.modal-close { background: none; border: none; font-size: 24px; color: var(--text-light); cursor: pointer; }
.modal-close:hover { color: var(--text); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group-sm { margin-bottom: 14px; }
.form-group-sm label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 12px; color: var(--text-light); }
.form-group-sm input, .form-group-sm select {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px;
}
.form-group-sm input:focus, .form-group-sm select:focus { outline: none; border-color: var(--gold); }

/* Toast */
.toast {
    position: fixed; top: 20px; right: 20px; padding: 14px 20px; border-radius: 10px;
    color: white; font-size: 14px; font-weight: 500; z-index: 2000;
    transform: translateX(120%); transition: transform .3s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
}
.toast.show { transform: translateX(0); }
.toast.success { background: var(--green); }
.toast.error { background: var(--danger); }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-light); }
.spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Organigramme */
.org-tree { padding: 8px 0; }
.org-level { margin-left: 0; }
.org-item { padding: 10px 16px; cursor: pointer; border-radius: 8px; margin: 2px 0; display: flex; align-items: center; gap: 8px; transition: background .15s; }
.org-item:hover { background: var(--bg); }
.org-item .chevron { transition: transform .2s; font-size: 12px; }
.org-item .chevron.open { transform: rotate(90deg); }
.org-children { margin-left: 24px; overflow: hidden; }
.org-l0 { font-weight: 700; font-size: 15px; color: var(--navy); background: #EBF0F7; }
.org-l1 { font-weight: 600; font-size: 14px; color: var(--green); }
.org-l2 { font-size: 13px; color: var(--text); }
.org-l3 { font-size: 13px; color: var(--text-light); }
.org-count { margin-left: auto; font-size: 11px; background: var(--navy); color: white; padding: 2px 8px; border-radius: 10px; }

/* Chart bars */
.bar-chart { display: flex; align-items: flex-end; gap: 16px; height: 160px; padding: 20px 0; }
.bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; }
.bar { width: 48px; border-radius: 6px 6px 0 0; transition: height .5s ease; min-height: 4px; }
.bar-label { font-size: 11px; color: var(--text-light); margin-top: 6px; text-align: center; }
.bar-value { font-size: 12px; font-weight: 700; margin-bottom: 4px; }

/* Bulletin display */
.bulletin-section { margin: 16px 0; }
.bulletin-section h3 { font-size: 14px; color: var(--navy); margin-bottom: 8px; padding: 6px 12px; background: var(--bg); border-radius: 6px; }
.bulletin-total { font-size: 20px; font-weight: 700; color: var(--green); text-align: right; padding: 12px; background: #D1FAE5; border-radius: 8px; margin: 16px 0; }
.bulletin-cout { font-size: 16px; font-weight: 600; text-align: right; padding: 10px; background: #FEF3C7; border-radius: 8px; }

/* Empty state */
.empty-state { text-align: center; padding: 48px; color: var(--text-light); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Carrière / Avancement */
.carriere-row { transition: background .2s; }
.carriere-row.disabled { background: #E5E7EB !important; opacity: .55; }
.carriere-row.disabled td { color: #9CA3AF; }
.carriere-row.traite td { background: #F0FDF4; }
.carriere-row .acte-input { width: 180px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
.carriere-row .acte-input:disabled { background: #F3F4F6; cursor: not-allowed; }
.carriere-row .cb-traiter { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green); }
.carriere-row .cb-traiter:disabled { cursor: not-allowed; accent-color: #9CA3AF; }
.badge-titularisation { background: #DBEAFE; color: #1E40AF; }
.badge-validation { background: #FEF3C7; color: #92400E; }
.badge-avancement { background: #EDE9FE; color: #5B21B6; }
.carriere-legend { display: flex; gap: 16px; margin-bottom: 16px; font-size: 12px; align-items: center; }
.carriere-legend .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.service-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 8px; }
.service-row .form-group-sm { flex: 1; margin-bottom: 0; }
.service-row button { flex-shrink: 0; margin-bottom: 0; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     PAGE DE CONNEXION
     ═══════════════════════════════════════════════════════════════ -->
<div id="login-page">
    <div class="login-card">
        <span class="flag">🇸🇳</span>
        <h1>SIRH</h1>
        <p class="subtitle">Système d'Information des Ressources Humaines<br>Administration Publique Sénégalaise</p>
        <div class="form-group">
            <label>Identifiant</label>
            <input type="text" id="login-user" placeholder="admin" autofocus>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="login-pass" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()" id="login-btn">Se connecter</button>
        <p class="login-error" id="login-error"></p>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     APPLICATION
     ═══════════════════════════════════════════════════════════════ -->
<div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="flag">🇸🇳</span>
            <h2>SIRH</h2>
            <p>Administration Publique</p>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div class="user-name" id="sidebar-user-name"></div>
            <div class="user-role" id="sidebar-user-role"></div>
            <button class="btn btn-outline btn-sm btn-logout" onclick="logout()">Déconnexion</button>
        </div>
    </aside>

    <!-- Topbar -->
    <header class="topbar">
        <h1 id="page-title">Tableau de bord</h1>
        <div class="user-info">
            <span id="topbar-user"></span>
        </div>
    </header>

    <!-- Content -->
    <main class="content" id="content"></main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal-content"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let currentUser = null;
let currentPage = 'dashboard';

const NAV_ITEMS = [
    { id: 'dashboard', icon: '📊', label: 'Tableau de bord' },
    { id: 'organigramme', icon: '🏛️', label: 'Organigramme' },
    { id: 'agents', icon: '👥', label: 'Agents' },
    { id: 'grilles', icon: '📋', label: 'Grilles indiciaires' },
    { id: 'evs', icon: '📝', label: 'Éléments variables' },
    { id: 'carriere', icon: '🎖️', label: 'Avancement & Validation' },
    { id: 'calcul', icon: '💰', label: 'Calcul de paie' },
    { id: 'masse-salariale', icon: '📈', label: 'Masse salariale' },
    { id: 'parametres', icon: '⚙️', label: 'Paramètres', admin: true },
];

/* ═══════════════════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════════════════ */
function fmt(n) {
    if (n == null || isNaN(n)) return '0';
    return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
}
function fmtDate(d) {
    if (!d) return '';
    const parts = d.split('-');
    if (parts.length >= 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
    return d;
}
function badgeStatut(s) { return `<span class="badge badge-${s}">${s}</span>`; }
function badgeValid(s) {
    const labels = { en_attente: 'En attente', valide: 'Validé', rejete: 'Rejeté', visa: 'Visé' };
    return `<span class="badge badge-${s}">${labels[s] || s}</span>`;
}

/* ═══════════════════════════════════════════════════════════════
   API
   ═══════════════════════════════════════════════════════════════ */
async function api(method, path, body = null) {
    const headers = { 'Content-Type': 'application/json' };
    const token = localStorage.getItem('token');
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    try {
        const res = await fetch(`/api${path}`, opts);
        if (res.status === 401) { logout(); return null; }
        const data = await res.json();
        if (!res.ok) { toast(data.error || 'Erreur', 'error'); return null; }
        return data;
    } catch (e) {
        toast('Erreur réseau', 'error');
        return null;
    }
}

/* ═══════════════════════════════════════════════════════════════
   AUTH
   ═══════════════════════════════════════════════════════════════ */
async function doLogin() {
    const login = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    if (!login || !pass) { errEl.textContent = 'Veuillez remplir tous les champs'; errEl.style.display = 'block'; return; }

    const res = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, mot_de_passe: pass })
    });
    const data = await res.json();

    if (!res.ok) { errEl.textContent = data.error || 'Identifiants incorrects'; errEl.style.display = 'block'; return; }

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    currentUser = data.user;
    showApp();
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    currentUser = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-page').style.display = 'flex';
}

function showApp() {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('sidebar-user-name').textContent = currentUser.nom;
    const roles = { admin: 'Administrateur', gestionnaire: 'Gestionnaire RH', controleur: 'Contrôleur', auditeur: 'Auditeur' };
    document.getElementById('sidebar-user-role').textContent = roles[currentUser.role] || currentUser.role;
    document.getElementById('topbar-user').textContent = `${currentUser.nom} (${currentUser.role})`;
    buildNav();
    navigate(currentPage);
}

/* ═══════════════════════════════════════════════════════════════
   NAV
   ═══════════════════════════════════════════════════════════════ */
function buildNav() {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = NAV_ITEMS
        .filter(n => !n.admin || currentUser.role === 'admin')
        .map(n => `<div class="nav-item${currentPage===n.id?' active':''}" onclick="navigate('${n.id}')">
            <span class="icon">${n.icon}</span>${n.label}
        </div>`).join('');
}

function navigate(page) {
    currentPage = page;
    const titles = { dashboard:'Tableau de bord', organigramme:'Organigramme', agents:'Gestion des agents', grilles:'Grilles indiciaires', evs:'Éléments variables', carriere:'Avancement & Validation', calcul:'Calcul de paie', 'masse-salariale':'Rapport masse salariale', parametres:'Paramètres' };
    document.getElementById('page-title').textContent = titles[page] || page;
    buildNav();
    renderPage();
}

function renderPage() {
    const c = document.getElementById('content');
    c.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">Chargement...</p></div>';
    switch(currentPage) {
        case 'dashboard': renderDashboard(c); break;
        case 'organigramme': renderOrganigramme(c); break;
        case 'agents': renderAgents(c); break;
        case 'grilles': renderGrilles(c); break;
        case 'evs': renderEVS(c); break;
        case 'carriere': renderCarriere(c); break;
        case 'calcul': renderCalcul(c); break;
        case 'masse-salariale': renderMasseSalariale(c); break;
        case 'parametres': renderParametres(c); break;
        default: c.innerHTML = '<div class="empty-state"><div class="icon">🚧</div><p>Page en construction</p></div>';
    }
}

/* ═══════════════════════════════════════════════════════════════
   TOAST & MODAL
   ═══════════════════════════════════════════════════════════════ */
function toast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
}

function openModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
}

/* ═══════════════════════════════════════════════════════════════
   1. DASHBOARD
   ═══════════════════════════════════════════════════════════════ */
async function renderDashboard(c) {
    const data = await api('GET', '/stats');
    if (!data) return;

    const statuts = data.agents_par_statut || {};
    const colors = { titulaire:'#2563EB', contractuel:'#D97706', militaire:'#DB2777', gendarmerie:'#7C3AED', police:'#059669' };
    const maxVal = Math.max(...Object.values(statuts), 1);

    let barsHtml = '';
    for (const [s, n] of Object.entries(statuts)) {
        const h = Math.max((n / maxVal) * 120, 8);
        barsHtml += `<div class="bar-group">
            <div class="bar-value">${n}</div>
            <div class="bar" style="height:${h}px;background:${colors[s]||'#999'}"></div>
            <div class="bar-label">${s}</div>
        </div>`;
    }

    c.innerHTML = `
        <div class="kpi-grid">
            <div class="kpi-card"><div class="label">Total Agents</div><div class="value">${data.total_agents}</div></div>
            <div class="kpi-card green"><div class="label">Ministères</div><div class="value">${data.total_ministeres}</div></div>
            <div class="kpi-card gold"><div class="label">EVS en attente</div><div class="value">${data.evs_en_attente}</div></div>
            <div class="kpi-card danger"><div class="label">Titulaires</div><div class="value">${statuts.titulaire||0}</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
            <div class="card">
                <div class="card-header"><span class="card-title">Répartition par statut</span></div>
                <div class="bar-chart">${barsHtml}</div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">Derniers agents enregistrés</span></div>
                <table>
                    <tr><th>Matricule</th><th>Nom</th><th>Statut</th><th>Ministère</th></tr>
                    ${(data.derniers_agents||[]).map(a => `<tr>
                        <td><strong>${a.matricule}</strong></td>
                        <td>${a.nom} ${a.prenom}</td>
                        <td>${badgeStatut(a.statut)}</td>
                        <td style="font-size:12px">${a.ministere_nom||''}</td>
                    </tr>`).join('')}
                </table>
            </div>
        </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   2. ORGANIGRAMME
   ═══════════════════════════════════════════════════════════════ */
async function renderOrganigramme(c) {
    const data = await api('GET', '/organigramme');
    if (!data) return;

    function renderLevel(items, level) {
        return items.map(item => {
            const cls = `org-l${level}`;
            const children = level === 0 ? item.directions_generales :
                             level === 1 ? item.directions :
                             level === 2 ? item.services : null;
            const count = level === 3 ? `<span class="org-count">${item.nb_agents || 0} agents</span>` : '';
            const id = `org-${level}-${item.id}`;

            let childrenHtml = '';
            if (children && children.length > 0) {
                childrenHtml = `<div class="org-children" id="${id}-children" style="display:none">${renderLevel(children, level+1)}</div>`;
            }

            const hasChildren = children && children.length > 0;
            const chevron = hasChildren ? `<span class="chevron" id="${id}-chev">▶</span>` : '<span style="width:12px"></span>';

            return `<div class="org-level">
                <div class="org-item ${cls}" onclick="toggleOrg('${id}')">
                    ${chevron}
                    <span>${item.nom || item.code}</span>
                    ${count}
                </div>
                ${childrenHtml}
            </div>`;
        }).join('');
    }

    c.innerHTML = `<div class="card"><div class="card-header"><span class="card-title">Organisation — Ministères et Services</span></div><div class="org-tree">${renderLevel(data, 0)}</div></div>`;
}

function toggleOrg(id) {
    const children = document.getElementById(id + '-children');
    const chev = document.getElementById(id + '-chev');
    if (!children) return;
    const open = children.style.display !== 'none';
    children.style.display = open ? 'none' : 'block';
    if (chev) chev.classList.toggle('open', !open);
}

   3. AGENTS

let agentsPage = 1;
let agentsFilters = { statut: '', ministere_id: '', q: '' };

async function renderAgents(c) {
    const params = new URLSearchParams({ page: agentsPage, per_page: 15, ...agentsFilters });
    Object.keys(agentsFilters).forEach(k => { if(!agentsFilters[k]) params.delete(k); });

    // Charger ministères pour le filtre
    const [data, orga] = await Promise.all([
        api('GET', `/agents?${params}`),
        api('GET', '/organigramme')
    ]);
    if (!data) return;

    const minOptions = (orga||[]).map(m => `<option value="${m.id}"${agentsFilters.ministere_id==m.id?' selected':''}>${m.nom}</option>`).join('');
    const canCreate = ['admin','gestionnaire'].includes(currentUser.role);

    c.innerHTML = `
        <div class="card">
            <div class="filter-bar">
                <select onchange="agentsFilters.statut=this.value;agentsPage=1;renderAgents(document.getElementById('content'))">
                    <option value="">Tous les statuts</option>
                    <option value="titulaire"${agentsFilters.statut==='titulaire'?' selected':''}>Titulaire</option>
                    <option value="contractuel"${agentsFilters.statut==='contractuel'?' selected':''}>Contractuel</option>
                    <option value="militaire"${agentsFilters.statut==='militaire'?' selected':''}>Militaire</option>
                    <option value="gendarmerie"${agentsFilters.statut==='gendarmerie'?' selected':''}>Gendarmerie</option>
                    <option value="police"${agentsFilters.statut==='police'?' selected':''}>Police</option>
                </select>
                <select onchange="agentsFilters.ministere_id=this.value;agentsPage=1;renderAgents(document.getElementById('content'))">
                    <option value="">Tous les ministères</option>${minOptions}
                </select>
                <input type="text" placeholder="Rechercher nom, matricule..." value="${agentsFilters.q}" oninput="agentsFilters.q=this.value" onkeyup="if(event.key==='Enter'){agentsPage=1;renderAgents(document.getElementById('content'))}">
                <button class="btn btn-primary btn-sm" onclick="agentsPage=1;renderAgents(document.getElementById('content'))">🔍 Rechercher</button>
                ${canCreate ? '<button class="btn btn-success btn-sm" onclick="openAgentForm()">+ Nouvel agent</button>' : ''}
            </div>
            <table>
                <tr><th>Matricule</th><th>Nom</th><th>Prénom</th><th>Statut</th><th>Corps</th><th>Grade</th><th>Ministère</th><th>Actions</th></tr>
                ${data.agents.map(a => `<tr>
                    <td><strong>${a.matricule}</strong></td>
                    <td>${a.nom}</td><td>${a.prenom}</td>
                    <td>${badgeStatut(a.statut)}</td>
                    <td style="font-size:12px">${a.corps}</td>
                    <td style="font-size:12px">${a.grade}</td>
                    <td style="font-size:12px">${a.ministere_nom||''}</td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="viewAgent(${a.id})">Voir</button>
                        <button class="btn btn-gold btn-sm" onclick="quickCalc(${a.id})">💰</button>
                    </td>
                </tr>`).join('')}
            </table>
            ${data.agents.length === 0 ? '<div class="empty-state"><div class="icon">👥</div><p>Aucun agent trouvé</p></div>' : ''}
            <div class="pagination">
                <button ${agentsPage<=1?'disabled':''} onclick="agentsPage--;renderAgents(document.getElementById('content'))">← Précédent</button>
                <span>Page ${data.page} / ${Math.ceil(data.total/data.per_page)||1} (${data.total} agents)</span>
                <button ${agentsPage>=Math.ceil(data.total/data.per_page)?'disabled':''} onclick="agentsPage++;renderAgents(document.getElementById('content'))">Suivant →</button>
            </div>
        </div>`;
}

async function openAgentForm(agentId) {
    const grilles = await api('GET', '/grilles');
    const services = await api('GET', '/services');
    if (!grilles || !services) return;

    // Extraire les statuts, corps, grades uniques
    const statuts = [...new Set(grilles.map(g => g.statut))];
    let agent = null;
    if (agentId) {
        const d = await api('GET', `/agents/${agentId}`);
        if (d) agent = d.agent;
    }

    openModal(`
        <div class="modal-header"><h2>${agent?'Modifier':'Nouvel'} Agent</h2><button class="modal-close" onclick="closeModal()">×</button></div>
        <form onsubmit="saveAgent(event, ${agentId||'null'})">
            <div class="form-row">
                <div class="form-group-sm"><label>Nom</label><input id="f-nom" required value="${agent?agent.nom:''}"></div>
                <div class="form-group-sm"><label>Prénom</label><input id="f-prenom" required value="${agent?agent.prenom:''}"></div>
            </div>
            <div class="form-row">
                <div class="form-group-sm"><label>Date de naissance</label><input type="date" id="f-dob" value="${agent?agent.date_naissance:''}"></div>
                <div class="form-group-sm"><label>Sexe</label><select id="f-sexe"><option value="M" ${agent&&agent.sexe==='M'?'selected':''}>Masculin</option><option value="F" ${agent&&agent.sexe==='F'?'selected':''}>Féminin</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group-sm"><label>Statut</label>
                    <select id="f-statut" onchange="updateCorps()" required>
                        <option value="">-- Choisir --</option>
                        ${statuts.map(s=>`<option value="${s}" ${agent&&agent.statut===s?'selected':''}>${s}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group-sm"><label>Corps</label><select id="f-corps" onchange="updateGrades()"></select></div>
            </div>
            <div class="form-row">
                <div class="form-group-sm"><label>Grade</label><select id="f-grade" onchange="updateEchelons()"></select></div>
                <div class="form-group-sm"><label>Échelon</label><select id="f-echelon" onchange="updateIndice()"></select></div>
            </div>
            <div class="form-row">
                <div class="form-group-sm"><label>Indice</label><input id="f-indice" readonly style="background:#f1f5f9"></div>
                <div class="form-group-sm"><label>Service</label>
                    <select id="f-service" required>
                        ${services.map(s=>`<option value="${s.id}" ${agent&&agent.service_id==s.id?'selected':''}>${s.ministere_nom} > ${s.nom}</option>`).join('')}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group-sm"><label>Situation matrimoniale</label>
                    <select id="f-matri">
                        ${['Célibataire','Marié(e)','Divorcé(e)','Veuf(ve)'].map(s=>`<option ${agent&&agent.situation_matrimoniale===s?'selected':''}>${s}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group-sm"><label>Enfants à charge</label><input type="number" id="f-enfants" min="0" max="10" value="${agent?agent.nb_enfants:0}"></div>
            </div>
            <div class="form-group-sm"><label>Date d'entrée en service</label><input type="date" id="f-entree" value="${agent?agent.date_entree:''}"></div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:12px">💾 Enregistrer</button>
        </form>
    `);

    // Stocker les grilles pour les cascades
    window._grilles = grilles;
    window._editAgent = agent;
    if (agent) updateCorps();
}

function updateCorps() {
    const statut = document.getElementById('f-statut').value;
    const corps = [...new Set(window._grilles.filter(g=>g.statut===statut).map(g=>g.corps))];
    const sel = document.getElementById('f-corps');
    const a = window._editAgent;
    sel.innerHTML = corps.map(c=>`<option value="${c}" ${a&&a.corps===c?'selected':''}>${c}</option>`).join('');
    updateGrades();
}
function updateGrades() {
    const statut = document.getElementById('f-statut').value;
    const corps = document.getElementById('f-corps').value;
    const grades = [...new Set(window._grilles.filter(g=>g.statut===statut&&g.corps===corps).map(g=>g.grade))];
    const sel = document.getElementById('f-grade');
    const a = window._editAgent;
    sel.innerHTML = grades.map(g=>`<option value="${g}" ${a&&a.grade===g?'selected':''}>${g}</option>`).join('');
    updateEchelons();
}
function updateEchelons() {
    const statut = document.getElementById('f-statut').value;
    const corps = document.getElementById('f-corps').value;
    const grade = document.getElementById('f-grade').value;
    const echelons = window._grilles.filter(g=>g.statut===statut&&g.corps===corps&&g.grade===grade);
    const sel = document.getElementById('f-echelon');
    const a = window._editAgent;
    sel.innerHTML = echelons.map(e=>`<option value="${e.echelon}" ${a&&a.echelon==e.echelon?'selected':''}>${e.echelon}</option>`).join('');
    updateIndice();
}
function updateIndice() {
    const statut = document.getElementById('f-statut').value;
    const corps = document.getElementById('f-corps').value;
    const grade = document.getElementById('f-grade').value;
    const ech = parseInt(document.getElementById('f-echelon').value);
    const found = window._grilles.find(g=>g.statut===statut&&g.corps===corps&&g.grade===grade&&g.echelon===ech);
    document.getElementById('f-indice').value = found ? found.indice : '';
}

async function saveAgent(e, agentId) {
    e.preventDefault();
    const body = {
        nom: document.getElementById('f-nom').value,
        prenom: document.getElementById('f-prenom').value,
        date_naissance: document.getElementById('f-dob').value,
        sexe: document.getElementById('f-sexe').value,
        statut: document.getElementById('f-statut').value,
        corps: document.getElementById('f-corps').value,
        grade: document.getElementById('f-grade').value,
        echelon: parseInt(document.getElementById('f-echelon').value),
        indice: parseInt(document.getElementById('f-indice').value),
        service_id: parseInt(document.getElementById('f-service').value),
        situation_matrimoniale: document.getElementById('f-matri').value,
        nb_enfants: parseInt(document.getElementById('f-enfants').value),
        date_entree: document.getElementById('f-entree').value,
    };
    const res = agentId
        ? await api('PUT', `/agents/${agentId}`, body)
        : await api('POST', '/agents', body);
    if (res) {
        toast(agentId ? 'Agent modifié' : `Agent créé : ${res.matricule}`);
        closeModal();
        renderAgents(document.getElementById('content'));
    }
}

        const data = await api('GET', `/grilles${params}`);
        if (!data) return;

        c.innerHTML = `
            <div class="card">
                <div class="filter-bar">
                    <select id="grille-filter" onchange="document.getElementById('grille-filter').dispatchEvent(new Event('filter'))">
                        <option value="">Tous les statuts</option>
                        <option value="titulaire" ${filterStatut==='titulaire'?'selected':''}>Titulaire</option>
                        <option value="contractuel" ${filterStatut==='contractuel'?'selected':''}>Contractuel</option>
                        <option value="militaire" ${filterStatut==='militaire'?'selected':''}>Militaire</option>
                        <option value="gendarmerie" ${filterStatut==='gendarmerie'?'selected':''}>Gendarmerie</option>
                        <option value="police" ${filterStatut==='police'?'selected':''}>Police</option>
                    </select>
                </div>
                <table>
                    <tr><th>Statut</th><th>Corps</th><th>Grade</th><th>Échelon</th><th>Indice</th><th>Salaire de base (FCFA)</th></tr>
                    ${data.map(g => `<tr>
                        <td>${badgeStatut(g.statut)}</td>
                        <td>${g.corps}</td><td>${g.grade}</td><td>${g.echelon}</td>
                        <td><strong>${g.indice}</strong></td>
                        <td><strong>${fmt(g.salaire_base)}</strong></td>
                    </tr>`).join('')}

        document.getElementById('grille-filter').addEventListener('change', function() {

async function renderEVS(c) {
    let filterValid = '', filterPeriode = '';
    async function load() {
        const params = new URLSearchParams();
        if (filterValid) params.set('statut_validation', filterValid);
        if (filterPeriode) params.set('periode', filterPeriode);

        const data = await api('GET', `/evs?${params}`);
        if (!data) return;

        const canCreate = ['admin', 'gestionnaire'].includes(currentUser.role);
        const canValidate = ['admin', 'gestionnaire', 'controleur'].includes(currentUser.role);

        c.innerHTML = `
            <div class="card">
                <div class="filter-bar">
                    <select id="evs-filter-valid" onchange="this.dispatchEvent(new Event('evs-reload'))">
                        <option value="">Tous les statuts</option>
                        <option value="en_attente" ${filterValid==='en_attente'?'selected':''}>En attente</option>
                        <option value="valide" ${filterValid==='valide'?'selected':''}>Validé</option>
                        <option value="rejete" ${filterValid==='rejete'?'selected':''}>Rejeté</option>
                        <option value="visa" ${filterValid==='visa'?'selected':''}>Visé</option>
                    </select>
                    <input type="month" id="evs-filter-periode" value="${filterPeriode}" onchange="this.dispatchEvent(new Event('evs-reload'))">
                    ${canCreate ? '<button class="btn btn-success btn-sm" onclick="openEvsForm()">+ Nouvel EVS</button>' : ''}
                </div>
                <table>
                    <tr><th>Agent</th><th>Type</th><th>Période</th><th>Qté</th><th>Montant</th><th>Statut</th>${canValidate?'<th>Actions</th>':''}</tr>
                    ${data.map(e => `<tr>
                        <td>${e.agent_nom} ${e.agent_prenom}<br><small style="color:var(--text-light)">${e.matricule}</small></td>
                        <td>${e.type_libelle}</td>
                        <td>${e.periode}</td>
                        <td>${e.quantite||'-'}</td>
                        <td>${fmt(e.montant)}</td>
                        <td>${badgeValid(e.statut_validation)}</td>
                        ${canValidate && e.statut_validation === 'en_attente' ? `<td>
                            <button class="btn btn-success btn-sm" onclick="validerEVS(${e.id},'valider')">✓</button>
                            <button class="btn btn-danger btn-sm" onclick="validerEVS(${e.id},'rejeter')">✕</button>
                            ${currentUser.role==='admin'||currentUser.role==='controleur'?`<button class="btn btn-gold btn-sm" onclick="validerEVS(${e.id},'visa')">Visa</button>`:''}
                        </td>` : canValidate && e.statut_validation === 'valide' && (currentUser.role==='admin'||currentUser.role==='controleur') ? `<td><button class="btn btn-gold btn-sm" onclick="validerEVS(${e.id},'visa')">Visa</button></td>` : canValidate?'<td>-</td>':''}
                    </tr>`).join('')}
                </table>
                ${data.length===0?'<div class="empty-state"><div class="icon">📝</div><p>Aucun élément variable</p></div>':''}
            </div>`;

        document.getElementById('evs-filter-valid').addEventListener('change', function() { filterValid = this.value; load(); });
        document.getElementById('evs-filter-periode').addEventListener('change', function() { filterPeriode = this.value; load(); });
    }
    load();
}

    if (!types || !agentsData) return;

        <form onsubmit="saveEVS(event)">
            <div class="form-group-sm"><label>Agent</label>
                <select id="evs-agent" required>
                    ${agentsData.agents.map(a=>`<option value="${a.id}">${a.matricule} — ${a.nom} ${a.prenom}</option>`).join('')}
                </select>
            </div>
            <div class="form-group-sm"><label>Type</label>
                <select id="evs-type" required>
                    ${types.map(t=>`<option value="${t.id}">${t.libelle} (${t.type_evs})</option>`).join('')}
                </select>
            </div>
            <div class="form-row">
                <div class="form-group-sm"><label>Période</label><input type="month" id="evs-periode" value="2026-03" required></div>
                <div class="form-group-sm"><label>Quantité</label><input type="number" id="evs-qte" step="0.5" min="0" value="0"></div>

async function chargerCarriere() {
    const matricule = document.getElementById('carr-matricule').value.trim().toUpperCase();
    if (!matricule) { toast('Saisissez un matricule', 'error'); return; }

    const r = document.getElementById('carriere-result');
    r.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const data = await api('GET', `/carriere/agent/matricule/${matricule}`);
    if (!data) { r.innerHTML = ''; return; }

    if (!data.mise_en_solde) {
        r.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">⚠️</div>
            <p>L'agent <strong>${data.agent.matricule} — ${data.agent.nom} ${data.agent.prenom}</strong> n'a pas encore été mis en solde.</p>
            <button class="btn btn-success" style="margin-top:12px" onclick="openMiseEnSolde(${data.agent.id})">Mise en solde</button>
        </div></div>`;
        return;
    }

    const a = data.agent;
    const mes = data.mise_en_solde;
    const aujourdhui = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

    // Légende
    let totalValidation = 0;
    if (data.validations) {
        totalValidation = data.validations.reduce((s, v) => s + v.duree_jours, 0);
    }

    let servicesHtml = '';
    if (data.validations && data.validations.length > 0) {
        servicesHtml = `<div style="margin-bottom:12px">
            <strong>Services antérieurs validés :</strong>
            ${data.validations.map(v => `<span class="badge badge-contractuel" style="margin-left:6px">${v.type_service} (${v.duree_jours} j.)</span>`).join('')}
            <span style="margin-left:8px;font-weight:600">Total : ${totalValidation} jours = ${(totalValidation/360).toFixed(1)} ans</span>
        </div>`;
    }

    let html = `
        <div class="card">
            <div class="card-header">
                <span class="card-title">Carrière de ${a.nom} ${a.prenom} — ${a.matricule}</span>
                <span style="font-size:13px;color:var(--text-light)">Date du jour : <strong>${fmtDate(aujourdhui)}</strong></span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;font-size:13px">
                <div><strong>Statut :</strong> ${badgeStatut(a.statut)}</div>
                <div><strong>Corps :</strong> ${a.corps}</div>
                <div><strong>Titularisé le :</strong> ${fmtDate(mes.date_titularisation)}</div>
                <div><strong>Position initiale :</strong> ${mes.classe_initiale} éch.${mes.echelon_initial}</div>
                <div><strong>Indice initial :</strong> ${mes.indice_initial}</div>
                <div><strong>Ministère :</strong> ${a.ministere_nom || ''}</div>
            </div>
            ${servicesHtml}
            <div class="carriere-legend">
                <span><span class="dot" style="background:#2563EB"></span> Titularisation</span>
                <span><span class="dot" style="background:#D97706"></span> Validation</span>
                <span><span class="dot" style="background:#7C3AED"></span> Avancement</span>
                <span><span class="dot" style="background:#E5E7EB"></span> Futur (non traitable)</span>
                <span><span class="dot" style="background:#D1FAE5"></span> Traité</span>
            </div>
            <form id="carriere-form" onsubmit="soumettreTraitements(event, ${a.id})">
                <table>
                    <tr>
                        <th style="width:40px">✓</th>
                        <th>Rang</th>
                        <th>Classe</th>
                        <th>Échelon</th>
                        <th>Indice</th>
                        <th>Salaire base</th>
                        <th>Date d'effet</th>
                        <th>Type</th>
                        <th>Référence de l'acte</th>
                        <th>Statut</th>
                    </tr>`;

    for (const e of data.carriere) {
        const estFutur = e.date_effet > aujourdhui;
        const estTraite = e.traite === 1;
        const desactive = estFutur || estTraite;
        const rowClass = estFutur ? 'carriere-row disabled' : estTraite ? 'carriere-row traite' : 'carriere-row';
        const salaireBase = fmt(e.indice * 475);

        let badgeMvt = '';
        if (e.type_mouvement === 'titularisation') badgeMvt = '<span class="badge badge-titularisation">Titularisation</span>';
        else if (e.type_mouvement === 'validation') badgeMvt = '<span class="badge badge-validation">Validation</span>';
        else badgeMvt = '<span class="badge badge-avancement">Avancement</span>';

        let statutCell = '';
        if (estTraite) {
            statutCell = `<span class="badge badge-visa">Traité</span>`;
        } else if (estFutur) {
            statutCell = `<span style="color:#9CA3AF;font-size:12px">Non échu</span>`;
        } else {
            statutCell = `<span class="badge badge-en_attente">À traiter</span>`;
        }

        html += `
            <tr class="${rowClass}">
                <td style="text-align:center">
                    <input type="checkbox" class="cb-traiter" data-id="${e.id}" ${desactive ? 'disabled' : ''}
                        ${estTraite ? 'checked' : ''}>
                </td>
                <td>${e.rang}</td>
                <td><strong>${e.classe}</strong></td>
                <td>${e.echelon}</td>
                <td><strong>${e.indice}</strong></td>
                <td>${salaireBase} FCFA</td>
                <td style="${estFutur ? 'color:#9CA3AF' : 'font-weight:600'}">${fmtDate(e.date_effet)}</td>
                <td>${badgeMvt}</td>
                <td>
                    <input type="text" class="acte-input" data-id="${e.id}"
                        value="${e.reference_acte || ''}"
                        placeholder="${desactive ? '' : 'Réf. acte...'}"
                        ${desactive ? 'disabled' : ''}>
                </td>
                <td>${statutCell}</td>
            </tr>`;
    }

    html += `
                </table>
                <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:12px">
                    <button type="submit" class="btn btn-primary">💾 Enregistrer les traitements</button>
                </div>
            </form>
        </div>`;

    r.innerHTML = html;
}

async function soumettreTraitements(event, agentId) {
    event.preventDefault();

    const checkboxes = document.querySelectorAll('.cb-traiter:checked:not(:disabled)');
    if (checkboxes.length === 0) {
        // Chercher les nouvellement cochées (pas disabled = pas déjà traitées ni futures)
        const newChecked = document.querySelectorAll('.cb-traiter:checked');
        let traitements = [];
        newChecked.forEach(cb => {
            if (!cb.disabled || cb.closest('tr').classList.contains('traite')) return;
        });
    }

    // Collecter les traitements cochés (non déjà traités)
    const allCb = document.querySelectorAll('.cb-traiter');
    let traitements = [];
    allCb.forEach(cb => {
        const tr = cb.closest('tr');
        if (cb.checked && !tr.classList.contains('traite') && !tr.classList.contains('disabled')) {
            const id = parseInt(cb.dataset.id);
            const acteInput = tr.querySelector('.acte-input');
            traitements.push({
                carriere_id: id,
                reference_acte: acteInput ? acteInput.value : ''
            });
        }
    });

    if (traitements.length === 0) {
        toast('Aucun avancement à traiter sélectionné', 'error');
        return;
    }

    const res = await api('POST', '/carriere/traiter-batch', { traitements });
    if (res) {
        toast(`${res.total_traites} avancement(s) traité(s)`);
        if (res.erreurs && res.erreurs.length > 0) {
            toast(`${res.total_erreurs} erreur(s): ${res.erreurs[0].error}`, 'error');
        }
        // Recharger
        chargerCarriere();
    }
}

    if (!agentsData) return;

                    </select>
                </div>

                    <input type="date" id="mes-date" required>

                    <select id="mes-corps" onchange="mesLoadRangs()"></select>
                </div>
            </div>

            <hr style="margin:16px 0;border:none;border-top:1px solid var(--border)">
            <h3 style="font-size:14px;color:var(--navy);margin-bottom:12px">Services antérieurs (validation d'ancienneté)</h3>
            <div id="mes-services"></div>
            <button type="button" class="btn btn-outline btn-sm" onclick="mesAddService()" style="margin-bottom:16px">+ Ajouter un service antérieur</button>

            <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">🎖️ Mettre en solde et calculer la carrière</button>
        </form>
    `);

    // Si un agent est pré-sélectionné, charger son statut/corps
    if (agentId) {

        if (opt) {
            document.getElementById('mes-statut').value = opt.dataset.statut;

            document.getElementById('mes-corps').value = opt.dataset.corps;
            await mesLoadRangs();
        }

    }

function mesClearCorps() {
    const sel = document.getElementById('mes-agent');
    const opt = sel.options[sel.selectedIndex];
    if (opt && opt.dataset.statut) {
        document.getElementById('mes-statut').value = opt.dataset.statut;
        mesLoadCorps().then(() => {
            if (opt.dataset.corps) {
                document.getElementById('mes-corps').value = opt.dataset.corps;
                mesLoadRangs();
            }
        });
    }
}

async function mesLoadCorps() {
    const statut = document.getElementById('mes-statut').value;
    const data = await api('GET', `/carriere/progression-grille?statut=${statut}`);
    if (!data) return;
    const corps = [...new Set(data.map(g => g.corps))];
    document.getElementById('mes-corps').innerHTML = corps.map(c => `<option value="${c}">${c}</option>`).join('');
    mesLoadRangs();
}

async function mesLoadRangs() {
    const statut = document.getElementById('mes-statut').value;
    const corps = document.getElementById('mes-corps').value;
    if (!statut || !corps) return;
    const data = await api('GET', `/carriere/rangs?statut=${statut}&corps=${corps}`);
    if (!data) return;
    document.getElementById('mes-rang').innerHTML = data.map(r =>
        `<option value="${r.rang}">${r.classe} — éch.${r.echelon} (ind.${r.indice})</option>`
    ).join('');
}

let mesServiceCount = 0;
function mesAddService() {
    const div = document.getElementById('mes-services');
    const n = mesServiceCount++;
    const row = document.createElement('div');
    row.className = 'service-row';
    row.id = `mes-svc-${n}`;
    row.innerHTML = `
        <div class="form-group-sm"><label>Type</label>
            <select id="mes-svc-type-${n}">
                <option value="volontaire">Volontaire</option>
                <option value="contractuel">Contractuel</option>

                <option value="stagiaire">Stagiaire</option>
            </select>
        </div>
        <div class="form-group-sm"><label>Date début</label><input type="date" id="mes-svc-deb-${n}"></div>
        <div class="form-group-sm"><label>Date fin</label><input type="date" id="mes-svc-fin-${n}"></div>
        <div class="form-group-sm"><label>Durée (jours)</label><input type="number" id="mes-svc-jours-${n}" min="1" placeholder="Ex: 720"></div>

async function executerMiseEnSolde(event) {
    event.preventDefault();

    const agentId = document.getElementById('mes-agent').value;
    const dateTit = document.getElementById('mes-date').value;
    const rangInit = parseInt(document.getElementById('mes-rang').value);

    if (!agentId || !dateTit) { toast('Remplissez tous les champs', 'error'); return; }

    // Collecter les services antérieurs
    const services = [];
    document.querySelectorAll('[id^="mes-svc-type-"]').forEach(sel => {
        const n = sel.id.replace('mes-svc-type-', '');
        const dateDebEl = document.getElementById(`mes-svc-deb-${n}`);
        const dateFinEl = document.getElementById(`mes-svc-fin-${n}`);
        const joursEl = document.getElementById(`mes-svc-jours-${n}`);
        if (dateDebEl && dateFinEl && joursEl) {
            const jours = parseInt(joursEl.value) || 0;
            if (jours > 0) {
                services.push({
                    type_service: sel.value,
                    date_debut: dateDebEl.value || dateTit,
                    date_fin: dateFinEl.value || dateTit,
                    duree_jours: jours,
                });
            }
        }
    });

    const res = await api('POST', '/carriere/mise-en-solde', {
        agent_id: parseInt(agentId),
        date_titularisation: dateTit,
        rang_initial: rangInit,
        services_anterieurs: services,
    });

    if (res) {
        toast(`Mise en solde effectuée — ${res.nb_etapes} étapes calculées`);
        closeModal();
        // Charger la carrière
        document.getElementById('carr-matricule').value = res.carriere[0] ? '' : '';
        // Charger via l'agent_id
        const r = document.getElementById('carriere-result');
        r.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        const data = await api('GET', `/carriere/agent/${res.agent_id}`);
        if (data) {
            document.getElementById('carr-matricule').value = data.agent.matricule;
            chargerCarriere();
        }
    }
}

    r.innerHTML = '<div class="loading"><div class="spinner"></div><p>Calcul en cours pour tous les agents...</p></div>';
    const data = await api('POST', '/bulletins/batch', { periode });
    if (!data) { r.innerHTML = ''; return; }
    r.innerHTML = `
        <div class="card">
            <h3 style="color:var(--navy);margin-bottom:12px">✅ Calcul batch terminé — ${data.periode}</h3>
            <div class="kpi-grid">
                <div class="kpi-card"><div class="label">Bulletins calculés</div><div class="value">${data.total_calcules}</div></div>
                <div class="kpi-card danger"><div class="label">Erreurs</div><div class="value">${data.total_erreurs}</div></div>
                <div class="kpi-card green"><div class="label">Masse salariale nette</div><div class="value" style="font-size:20px">${fmt(data.masse_salariale_nette)}</div></div>
                <div class="kpi-card gold"><div class="label">Coût total employeur</div><div class="value" style="font-size:20px">${fmt(data.cout_total_employeur)}</div></div>
            </div>
            <table>
                <tr><th>Matricule</th><th>Nom</th><th style="text-align:right">Salaire net</th><th style="text-align:right">Coût employeur</th></tr>
                ${data.resultats.map(r=>`<tr><td>${r.matricule}</td><td>${r.nom}</td><td style="text-align:right">${fmt(r.salaire_net)}</td><td style="text-align:right">${fmt(r.cout_employeur)}</td></tr>`).join('')}
            </table>
        </div>`;
    toast(`${data.total_calcules} bulletins calculés`);
}

async function downloadPDF(bulletinId) {
    const data = await api('GET', `/bulletins/${bulletinId}/pdf`);
    if (data && data.pdf_url) {
        window.open(data.pdf_url, '_blank');
    }
}

/* ═══════════════════════════════════════════════════════════════
   7. MASSE SALARIALE
   ═══════════════════════════════════════════════════════════════ */
async function renderMasseSalariale(c) {
    c.innerHTML = `
        <div class="card" style="margin-bottom:20px">
            <div class="filter-bar">
                <input type="month" id="ms-periode" value="2026-03">
                <select id="ms-niveau">
                    <option value="ministere">Par ministère</option>
                    <option value="direction">Par direction</option>
                </select>
                <button class="btn btn-primary" onclick="loadMasseSalariale()">📊 Générer rapport</button>
            </div>
        </div>
        <div id="ms-result">
            <div class="empty-state"><div class="icon">📈</div><p>Sélectionnez une période et lancez le rapport.<br><small>Astuce : lancez d'abord un calcul batch pour alimenter les données.</small></p></div>
        </div>`;
}

async function loadMasseSalariale() {
    const periode = document.getElementById('ms-periode').value;
    const niveau = document.getElementById('ms-niveau').value;
    const r = document.getElementById('ms-result');
    r.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const data = await api('GET', `/rapport/masse-salariale?periode=${periode}&niveau=${niveau}`);
    if (!data) { r.innerHTML = ''; return; }

    if (data.lignes.length === 0) {
        r.innerHTML = '<div class="card"><div class="empty-state"><div class="icon">📊</div><p>Aucune donnée pour cette période. Lancez un calcul batch d\'abord.</p></div></div>';
        return;
    }

    r.innerHTML = `
        <div class="card">
            <div class="card-header"><span class="card-title">Rapport masse salariale — ${data.periode} (par ${data.niveau})</span></div>
            <div style="overflow-x:auto">
                <table>
                    <tr><th>Entité</th><th style="text-align:right">Agents</th><th style="text-align:right">Base</th><th style="text-align:right">Primes</th><th style="text-align:right">Brut</th><th style="text-align:right">Net</th><th style="text-align:right">Charges</th><th style="text-align:right">Coût total</th></tr>
                    ${data.lignes.map(l=>`<tr>
                        <td><strong>${l.entite}</strong></td>
                        <td style="text-align:right">${l.nb_agents}</td>
                        <td style="text-align:right">${fmt(l.total_base)}</td>
                        <td style="text-align:right">${fmt(l.total_primes)}</td>
                        <td style="text-align:right">${fmt(l.total_brut)}</td>
                        <td style="text-align:right;font-weight:600">${fmt(l.total_net)}</td>
                        <td style="text-align:right">${fmt(l.total_charges)}</td>
                        <td style="text-align:right;font-weight:600;color:var(--navy)">${fmt(l.total_cout)}</td>
                    </tr>`).join('')}
                    <tr style="background:var(--navy);color:white;font-weight:700">
                        <td>TOTAL</td>
                        <td style="text-align:right">${data.totaux.nb_agents}</td>
                        <td style="text-align:right">${fmt(data.totaux.total_base)}</td>
                        <td style="text-align:right">${fmt(data.totaux.total_primes)}</td>
                        <td style="text-align:right">${fmt(data.totaux.total_brut)}</td>
                        <td style="text-align:right">${fmt(data.totaux.total_net)}</td>
                        <td style="text-align:right">${fmt(data.totaux.total_charges)}</td>
                        <td style="text-align:right">${fmt(data.totaux.total_cout)}</td>
                    </tr>
                </table>
            </div>
        </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   8. PARAMÈTRES
   ═══════════════════════════════════════════════════════════════ */
async function renderParametres(c) {
    if (currentUser.role !== 'admin') {
        c.innerHTML = '<div class="empty-state"><div class="icon">🔒</div><p>Accès réservé aux administrateurs</p></div>';
        return;
    }

    const data = await api('GET', '/parametres');
    if (!data) return;

    const vpActuel = data.find(p => p.code === 'VALEUR_POINT' && p.periode === '2026-03');

    c.innerHTML = `
        <div class="card" style="margin-bottom:20px">
            <div class="card-header"><span class="card-title">Valeur du point d'indice</span></div>
            <p style="margin-bottom:16px;font-size:14px;color:var(--text-light)">Valeur actuelle (mars 2026) : <strong style="color:var(--navy);font-size:18px">${vpActuel ? fmt(vpActuel.valeur) : '475'} FCFA</strong></p>
            <div class="filter-bar">
                <input type="month" id="param-periode" value="2026-03">
                <input type="number" id="param-valeur" value="475" min="1" style="width:120px">
                <button class="btn btn-primary" onclick="updateValeurPoint()">💾 Mettre à jour</button>
            </div>
        </div>
        <div class="card">
            <div class="card-header"><span class="card-title">Historique des paramètres</span></div>
            <table>
                <tr><th>Code</th><th>Libellé</th><th>Période</th><th style="text-align:right">Valeur (FCFA)</th></tr>
                ${data.map(p => `<tr>
                    <td><strong>${p.code}</strong></td>
                    <td>${p.libelle}</td>
                    <td>${p.periode}</td>
                    <td style="text-align:right;font-weight:600">${fmt(p.valeur)}</td>
                </tr>`).join('')}
            </table>
        </div>`;
}

async function updateValeurPoint() {
    const periode = document.getElementById('param-periode').value;
    const valeur = parseFloat(document.getElementById('param-valeur').value);
    if (!periode || !valeur) { toast('Remplissez tous les champs', 'error'); return; }
    const res = await api('POST', '/parametres/valeur-point', { periode, valeur });
    if (res) { toast(res.message); renderParametres(document.getElementById('content')); }
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('token');
    const user = localStorage.getItem('user');
    if (token && user) {
        currentUser = JSON.parse(user);
        showApp();
    }
    // Enter key on login
    document.getElementById('login-pass').addEventListener('keyup', e => { if(e.key==='Enter') doLogin(); });
    document.getElementById('login-user').addEventListener('keyup', e => { if(e.key==='Enter') document.getElementById('login-pass').focus(); });
});
</script>
</body>
</html>
